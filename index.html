*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;min-height:100vh;background:var(--bg);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased;font-size:15px}

.container{max-width:960px;margin:0 auto;padding:0 24px 56px}

.hdr-badge{display:inline-flex;align-items:center;gap:6px;background:#EFF6FF;border:1px solid #BFDBFE;padding:7px 18px;border-radius:24px;font-size:13.5px;font-weight:650;color:#2563EB;margin-bottom:16px}

.hdr-title{font-size:36px;font-weight:900;letter-spacing:-0.04em;line-height:1.25;background:linear-gradient(135deg,#0F172A 0%,#4338CA 50%,#2563EB 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px}
.hdr-stats{font-size:15.5px;color:var(--text-secondary);margin-bottom:5px;font-weight:500}
.hdr-sub{font-size:13.5px;color:var(--text-tertiary);font-weight:500}
.intro-card{max-width:680px;margin:0 auto 24px;background:linear-gradient(135deg,#EFF6FF 0%,#F5F3FF 50%,#FFF7ED 100%);border:1.5px solid #DBEAFE;border-radius:18px;padding:28px 32px;position:relative;overflow:hidden;animation:fadeIn .5s ease}

.intro-text{position:relative;z-index:1;font-size:15px;line-height:1.85;color:#1E293B;font-weight:450;word-break:keep-all}
.intro-text .highlight{color:#2563EB;font-weight:700}
.intro-text .emphasis{color:#7C3AED;font-weight:700}
.intro-text .cta{display:inline-block;margin-top:10px;font-weight:750;color:#111827;font-size:15.5px}

/* ─── SOCIAL LINKS ─── */
.social-section{max-width:680px;margin:0 auto 28px;animation:fadeIn .6s ease}

.social-label{font-size:13px;font-weight:650;color:var(--text-primary);white-space:nowrap;letter-spacing:-0.01em}

.search-wrap{position:relative;margin:0 auto 28px;max-width:600px}
.search-ico{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--text-tertiary);pointer-events:none}

.cat-card{width:100%;padding:22px;background:var(--card-bg);border:1.5px solid var(--border);border-radius:16px;cursor:pointer;text-align:left;font-family:inherit;position:relative;overflow:hidden;transition:all .28s cubic-bezier(.4,0,.2,1);box-shadow:0 1px 3px rgba(0,0,0,.04);animation:cardIn .4s ease both;display:flex;align-items:center}

.cat-count{font-size:13px;font-weight:700;padding:5px 14px;border-radius:20px;flex-shrink:0;white-space:nowrap}

@media(min-width:960px){
.cat-grid{grid-template-columns:repeat(2,1fr);gap:16px}.tools-grid{grid-template-columns:repeat(2,1fr);gap:12px}.search-grid{grid-template-columns:repeat(2,1fr);gap:12px}
.hero-banner{padding:42px}.hero-title{font-size:30px}
.intro-card{padding:32px 36px}.intro-text{font-size:15.5px}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:6px}::-webkit-scrollbar-track{background:transparent}

function matchSearch(tool,q){const s=q.toLowerCase();return tool.name.toLowerCase().includes(s)||tool.desc.toLowerCase().includes(s)||(tool.alias&&tool.alias.some(a=>a.toLowerCase().includes(s)))}

function ToolCard({tool}){const badge=tool.badge?badgeStyles[tool.badge]||badgeStyles["유쌤추천"]:null;return(<a href={tool.url} target="_blank" rel="noopener noreferrer" className="tool-card"><div style={{paddingRight:"24px"}}><div className="tool-name-row"><span className="tool-name">{tool.name}</span>{badge&&<span className="tool-badge" style={{background:badge.bg,color:badge.text,borderColor:badge.border}}>{badge.icon} {tool.badge}</span>}</div><p className="tool-desc">{tool.desc}</p></div><span className="tool-arrow">↗</span></a>)}

function InfoPanel({title,items,icon,color}){return(<div className="info-section"><div className="info-section-header"><span className="info-section-icon" style={{background:color+"14"}}>{icon}</span><span className="info-section-title">{title}</span></div><div className="info-items">{items.map((item,i)=>{const p=item.split(" — ");return(<div key={i} className="info-item"><span className="bullet" style={{color}}>●</span>{p.length>1?<span><strong>{p[0]}</strong> — {p[1]}</span>:<span>{item}</span>}</div>)})}</div></div>)}

function CategoryDetail({category,onBack}){const[showInfo,setShowInfo]=useState(false);return(<div style={{animation:"slideIn 0.35s ease"}}><button onClick={onBack} className="back-btn"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>전체 카테고리</button><div className="hero-banner" style={{background:category.gradient}}><div className="hero-bg-icon">{category.icon}</div><div style={{position:"relative",zIndex:1}}><div className="hero-main-icon">{category.icon}</div><h2 className="hero-title">{category.name}</h2><p className="hero-subtitle">{category.subtitle}</p><p className="hero-concept">{category.concept}</p></div></div><button onClick={()=>setShowInfo(!showInfo)} className="info-toggle-btn"><span className="info-toggle-label"><span style={{fontSize:"17px"}}>📖</span><span>주요기능 · 활용분야 · 주의점</span></span><svg width="20" height="20" viewBox="0 0 20 20" fill="none" className="info-toggle-arrow" style={{transform:showInfo?"rotate(180deg)":"rotate(0)"}}><path d="M5 8l5 5 5-5" stroke="#94A3B8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg></button>{showInfo&&(<div className="info-panel"><InfoPanel icon="⚡" title="주요 기능" items={category.features} color={category.color}/><InfoPanel icon="🎯" title="주요 활용 분야" items={category.useCases} color={category.color}/><InfoPanel icon="⚠️" title="주의점" items={category.cautions} color="#DC2626"/></div>)}<div className="tools-list-header"><h3 className="tools-list-title">추천 AI 도구</h3><span className="tools-list-count" style={{background:category.color+"14",color:category.color}}>{category.tools.length}개</span></div><div className="tools-grid">{category.tools.map((t,i)=><ToolCard key={i} tool={t}/>)}</div></div>)}

function CategoryCard({category,onClick,idx}){return(<button onClick={onClick} className="cat-card" style={{animationDelay:idx*0.04+"s"}}><div className="cat-bar" style={{background:category.gradient}}/><div className="cat-inner"><div className="cat-icon" style={{background:category.color+"10"}}>{category.icon}</div><div className="cat-text"><div className="cat-name">{category.name}</div><div className="cat-sub">{category.subtitle}</div></div><div className="cat-count" style={{background:category.color+"12",color:category.color}}>{category.tools.length}개</div></div></button>)}

function SocialLinks(){return(<div className="social-section"><div className="social-grid">{socialLinks.map((s,i)=>(<a key={i} href={s.url} target="_blank" rel="noopener noreferrer" className="social-link"><span className="social-icon" style={{background:s.color}}>{s.icon}</span><span className="social-label" style={s.iconColor?{color:s.iconColor}:{}}>{s.name}</span></a>))}</div></div>)}

function App(){
  const[selected,setSelected]=useState(null);
  const[search,setSearch]=useState("");
  const totalTools=categories.reduce((a,c)=>a+c.tools.length,0);
  const filteredTools=search.trim()?categories.flatMap(c=>c.tools.filter(t=>matchSearch(t,search)).map(t=>({...t,category:c}))):[];
  const selectedCategory=selected?categories.find(c=>c.id===selected):null;
  function goHome(){setSelected(null);setSearch("");window.scrollTo({top:0,behavior:"smooth"})}
  useEffect(()=>{if(selected)window.scrollTo({top:0,behavior:"smooth"})},[selected]);
  const showHome=!search.trim()&&!selectedCategory;

  return(
    <React.Fragment>
      <nav className="top-nav"><div className="top-nav-inner"><button onClick={goHome} className="home-btn">🏠 홈</button><span className="top-nav-title">유쌤클래스 AI 도구 모음집</span></div></nav>
      <div className="container">
        <div className="hdr">
          <div className="hdr-badge"><span className="hdr-badge-ico">🤖</span> 친절한유성쌤이 추천하는</div>
          <h1 className="hdr-title">AI 도구 모음집 2026</h1>
          <p className="hdr-stats">{categories.length}개 카테고리 · {totalTools}개 AI 도구</p>
          <p className="hdr-sub">유쌤클래스 | AI콘텐츠마케팅연구소</p>
        </div>

        {showHome&&(<React.Fragment>
          <div className="intro-card"><p className="intro-text">
            AI 도구는 많지만, 어떤 걸 써야 할지 막막하셨죠? <span className="highlight">친절한유성쌤</span>이 강의 현장에서 수강생들과 함께 직접 써보고 검증한 AI 도구 <span className="emphasis">{totalTools}개</span>를 <span className="emphasis">8개 카테고리</span>로 한눈에 정리했습니다.<br/><br/>콘텐츠 기획부터 마케팅, 영상 제작, 업무 자동화까지 — 이 모음집 하나면 2026년 AI 활용, 어렵지 않습니다.<br/><span className="cta">📌 북마크 필수인 AI 도구 가이드, 지금 바로 확인해 보세요!</span>
          </p></div>
          <SocialLinks/>
        </React.Fragment>)}

        <div className="search-wrap"><span className="search-ico">🔍</span><input type="text" className="search-input" placeholder="AI 도구 이름 또는 키워드 검색... (예: 제미나이, 캡컷)" value={search} onChange={(e)=>{setSearch(e.target.value);setSelected(null)}}/></div>

        {search.trim()&&!selected&&(<div style={{animation:"fadeIn 0.3s ease"}}>{filteredTools.length>0?(<React.Fragment><p style={{fontSize:"14px",color:"#6B7280",margin:"0 0 14px 4px"}}>검색 결과 <strong style={{color:"#111827"}}>{filteredTools.length}개</strong></p><div className="search-grid">{filteredTools.map((t,i)=>(<div key={i} style={{position:"relative"}}><ToolCard tool={t}/><span className="search-cat-tag" style={{color:t.category.color,background:t.category.color+"10"}}>{t.category.icon} {t.category.name}</span></div>))}</div></React.Fragment>):(<div style={{textAlign:"center",padding:"48px 0",color:"#6B7280"}}><div style={{fontSize:"40px",marginBottom:"12px"}}>🔍</div><p style={{fontSize:"15px"}}>"{search}"에 대한 결과가 없습니다</p></div>)}</div>)}

        {!search.trim()&&selectedCategory?(<CategoryDetail category={selectedCategory} onBack={()=>setSelected(null)}/>):!search.trim()&&(<div className="cat-grid">{categories.map((c,i)=>(<CategoryCard key={c.id} category={c} onClick={()=>setSelected(c.id)} idx={i}/>))}</div>)}

        <div className="ftr"><p>© 2026 친절한유성쌤 · 유쌤클래스</p><div className="ftr-links"><a href="https://www.yussamclass.com" target="_blank" rel="noopener noreferrer">yussamclass.com</a></div></div>
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
