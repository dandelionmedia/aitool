  "HOT": { bg: "#FEE2E2", text: "#B91C1C", border: "#FECACA", icon: "🔥" },
  "아바타": { bg: "#EDE9FE", text: "#6D28D9", border: "#DDD6FE", icon: "🧑" },
};

function ToolCard({ tool }) {
  const badge = tool.badge ? badgeStyles[tool.badge] || badgeStyles["유쌤추천"] : null;
  return (
    <a href={tool.url} target="_blank" rel="noopener noreferrer" className="tool-card">
      <div style={{ paddingRight: "22px" }}>
        <div className="tool-name-row">
          <span className="tool-name">{tool.name}</span>
          {badge && (
            <span className="tool-badge" style={{ background: badge.bg, color: badge.text, borderColor: badge.border }}>
              {badge.icon} {tool.badge}
            </span>
          )}
        </div>
        <p className="tool-desc">{tool.desc}</p>
      </div>
      <span className="tool-arrow">↗</span>
    </a>
  );
}

function InfoPanel({ title, items, icon, color }) {
  return (
    <div className="info-section">
      <div className="info-section-header">
        <span className="info-section-icon" style={{ background: color + "14" }}>{icon}</span>
        <span className="info-section-title">{title}</span>
      </div>
      <div className="info-items">
        {items.map((item, i) => {
          const parts = item.split(" — ");
          return (
            <div key={i} className="info-item">
              <span className="bullet" style={{ color }}>●</span>
              {parts.length > 1
                ? <span><strong>{parts[0]}</strong> — {parts[1]}</span>
                : <span>{item}</span>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CategoryDetail({ category, onBack }) {
  const [showInfo, setShowInfo] = useState(false);
  return (
    <div style={{ animation: "slideIn 0.35s ease" }}>
      <button onClick={onBack} className="back-btn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8l4-4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        전체 카테고리
      </button>
      <div className="hero-banner" style={{ background: category.gradient }}>
        <div className="hero-bg-icon">{category.icon}</div>
        <div style={{ position: "relative", zIndex: 1 }}>
          <div className="hero-main-icon">{category.icon}</div>
          <h2 className="hero-title">{category.name}</h2>
          <p className="hero-subtitle">{category.subtitle}</p>
          <p className="hero-concept">{category.concept}</p>
        </div>
      </div>
      <button onClick={() => setShowInfo(!showInfo)} className="info-toggle-btn">
        <span className="info-toggle-label">
          <span style={{ fontSize: "16px" }}>📖</span>
          <span>주요기능 · 활용분야 · 주의점</span>
        </span>
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" className="info-toggle-arrow" style={{ transform: showInfo ? "rotate(180deg)" : "rotate(0)" }}>
          <path d="M5 8l5 5 5-5" stroke="#94A3B8" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </button>
      {showInfo && (
        <div className="info-panel">
          <InfoPanel icon="⚡" title="주요 기능" items={category.features} color={category.color} />
          <InfoPanel icon="🎯" title="주요 활용 분야" items={category.useCases} color={category.color} />
          <InfoPanel icon="⚠️" title="주의점" items={category.cautions} color="#DC2626" />
          <div className="info-source">출처: 방송통신위원회 생성형AI 이용자 참여 플랫폼 (ai.wiseuser.go.kr)</div>
        </div>
      )}
      <div className="tools-list-header">
        <h3 className="tools-list-title">추천 AI 도구</h3>
        <span className="tools-list-count" style={{ background: category.color + "14", color: category.color }}>{category.tools.length}개</span>
      </div>
      <div className="tools-grid">
        {category.tools.map((tool, i) => <ToolCard key={i} tool={tool} />)}
      </div>
    </div>
  );
}

function CategoryCard({ category, onClick, idx }) {
  return (
    <button onClick={onClick} className="cat-card" style={{ animationDelay: idx * 0.04 + "s" }}>
      <div className="cat-bar" style={{ background: category.gradient }} />
      <div className="cat-inner">
        <div className="cat-icon" style={{ background: category.color + "10" }}>{category.icon}</div>
        <div className="cat-text">
          <div className="cat-name">{category.name}</div>
          <div className="cat-sub">{category.subtitle}</div>
        </div>
        <div className="cat-count" style={{ background: category.color + "12", color: category.color }}>{category.tools.length}개</div>
      </div>
    </button>
  );
}

function App() {
  const [selected, setSelected] = useState(null);
  const [search, setSearch] = useState("");
  const totalTools = categories.reduce((a, c) => a + c.tools.length, 0);

  const filteredTools = search.trim()
    ? categories.flatMap(c => c.tools.filter(t =>
        t.name.toLowerCase().includes(search.toLowerCase()) || t.desc.includes(search)
      ).map(t => ({ ...t, category: c })))
    : [];

  const selectedCategory = selected ? categories.find(c => c.id === selected) : null;

  useEffect(() => {
    if (selected) window.scrollTo({ top: 0, behavior: "smooth" });
  }, [selected]);

  return (
    <div className="container">
      <div className="hdr">
        <div className="hdr-badge">
          <span className="hdr-badge-ico">🤖</span> 친절한유성쌤이 추천하는
        </div>
        <h1 className="hdr-title">AI 도구 모음집 2026</h1>
        <p className="hdr-stats">{categories.length}개 카테고리 · {totalTools}개 AI 도구</p>
        <p className="hdr-sub">유쌤클래스 | AI콘텐츠마케팅연구소</p>
      </div>

      <div className="search-wrap">
        <span className="search-ico">🔍</span>
        <input
          type="text" className="search-input"
          placeholder="AI 도구 이름 또는 키워드 검색..."
          value={search}
          onChange={(e) => { setSearch(e.target.value); setSelected(null); }}
        />
      </div>

      {search.trim() && !selected && (
        <div style={{ animation: "fadeIn 0.3s ease" }}>
          {filteredTools.length > 0 ? (
            <React.Fragment>
              <p style={{ fontSize: "13px", color: "#94A3B8", margin: "0 0 12px 4px" }}>
                검색 결과 <strong style={{ color: "#0F172A" }}>{filteredTools.length}개</strong>
              </p>
              <div className="search-grid">
                {filteredTools.map((tool, i) => (
                  <div key={i} style={{ position: "relative" }}>
                    <ToolCard tool={tool} />
                    <span className="search-cat-tag" style={{ color: tool.category.color, background: tool.category.color + "10" }}>
                      {tool.category.icon} {tool.category.name}
                    </span>
                  </div>
                ))}
              </div>
            </React.Fragment>
          ) : (
            <div style={{ textAlign: "center", padding: "48px 0", color: "#94A3B8" }}>
              <div style={{ fontSize: "40px", marginBottom: "12px" }}>🔍</div>
              <p style={{ fontSize: "14px" }}>"{search}"에 대한 결과가 없습니다</p>
            </div>
          )}
        </div>
      )}

      {!search.trim() && selectedCategory ? (
        <CategoryDetail category={selectedCategory} onBack={() => setSelected(null)} />
      ) : !search.trim() && (
        <div className="cat-grid">
          {categories.map((cat, i) => (
            <CategoryCard key={cat.id} category={cat} onClick={() => setSelected(cat.id)} idx={i} />
          ))}
        </div>
      )}

      <div className="ftr">
        <p>© 2026 친절한유성쌤 · 유쌤클래스<br/>AI 도구 정보 출처: 방송통신위원회 생성형AI 이용자 참여 플랫폼</p>
        <div className="ftr-links">
          <a href="https://yussamclass.com" target="_blank" rel="noopener noreferrer">yussamclass.com</a>
          <a href="https://aicm.kr" target="_blank" rel="noopener noreferrer">aicm.kr</a>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
